[provider "openrouter-codex"]
label = "OpenRouter Codex Relay"
family = "openai-compatible"
protocol = "openai-responses"
api_base = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
model = "openai/codex-mini-latest"
best_for = "Codex-compatible routing through a relay provider"
supports_multimodal = false
supports_grounding = false
strengths = "Single key for multiple upstreams | Useful when you want Codex-style flows on a relay endpoint"

[provider "local-ollama-coder"]
label = "Local Ollama Coder"
family = "openai-compatible"
protocol = "openai-chat-completions"
api_base = "http://localhost:11434/v1"
api_key_env = "OLLAMA_API_KEY"
model = "qwen2.5-coder:latest"
best_for = "Local experiments and offline-ish iteration"
supports_multimodal = false
supports_grounding = false
strengths = "Runs on localhost | Good for sandboxed prototyping and cheap local tests"
